name: Mojito
options:
  bundleIdPrefix: ee.wells
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  # Bootstrap the build-time-generated Sources/Mojito/GifPicker/EmbeddedGiphyKey.swift
  # before xcodegen scans the source tree, so a fresh clone (where the gitignored
  # file doesn't yet exist) still picks it up as a project source. The per-build
  # phase below re-runs the same script so .env edits flow through without an
  # explicit `xcodegen generate`.
  preGenCommand: python3 scripts/build_giphy_key.py
  # Locales we ship UI translations for. Xcode derives CFBundleLocalizations
  # from this list. Adding a code here is necessary for the corresponding
  # column to appear in Localizable.xcstrings.
  knownRegions:
    - en
    - en-GB
    - de
    - es
    - es-419
    - fr
    - it
    - pt-BR
    - ja
    - zh-Hans
    - zh-Hant
    - ko
    - hi
    - ru
    - pl
    - nl
    # RTL — SwiftUI auto-mirrors layout via Environment(\.layoutDirection),
    # but the picker positioning + AppKit overlays may need spot-checks.
    - ar
    - fa
    - he

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    # "Mojito Dev" is a stable self-signed cert created by scripts/setup-dev-signing.sh.
    # Using a persistent identity (instead of ad-hoc "-") keeps macOS TCC grants —
    # Accessibility, Input Monitoring — across rebuilds.
    CODE_SIGN_IDENTITY: "Mojito Dev"
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_SWIFT_FLAGS: "$(inherited)"
    SWIFT_STRICT_CONCURRENCY: minimal
    # Tell the Swift compiler to emit .stringsdata for every SwiftUI Text("…")
    # / LocalizedStringKey / String(localized:) call so Xcode can sync them
    # into Localizable.xcstrings on build.
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZED_STRING_SWIFTUI_SUPPORT: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  Mojito:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Mojito
      - path: Resources/Assets.xcassets
      # Xcode 26 Icon Composer `.icon` bundles. xcodegen 2.45+ recognises
      # the extension as `folder.iconcomposer.icon` so actool processes
      # them as app-icon assets (do NOT set `type: folder` here — that
      # downgrades them to opaque folders and they get copied raw, which
      # is what broke the rendered app icon previously). The active icon
      # per config is selected via ASSETCATALOG_COMPILER_APPICON_NAME.
      - path: Resources/AppIcon.icon
      - path: Resources/AppIconDev.icon
      - path: Resources/Emoji
        type: folder
      # UI string catalog. Xcode auto-extracts every String(localized:) /
      # Text("…") literal into this on build.
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
      # Opaque-named effect assets. Names don't reveal their content; see
      # the Bundle.url(forResource:) call sites in Sources/Mojito/App/ for
      # which file is which.
      - path: Resources/s01.bin
        buildPhase: resources
      - path: Resources/s02.bin
        buildPhase: resources
      - path: Resources/s03.bin
        buildPhase: resources
      - path: Resources/s04.bin
        buildPhase: resources
      - path: Resources/s05.bin
        buildPhase: resources
      - path: Resources/s06.bin
        buildPhase: resources
      - path: Resources/s07.bin
        buildPhase: resources
      - path: Resources/s08.bin
        buildPhase: resources
      - path: Resources/s09.bin
        buildPhase: resources
      - path: Resources/s10.bin
        buildPhase: resources
      - path: Resources/s13.bin
        buildPhase: resources
      - path: Resources/s14.bin
        buildPhase: resources
      - path: Resources/s15.bin
        buildPhase: resources
      - path: Resources/s16.bin
        buildPhase: resources
      - path: Resources/v01.bin
        buildPhase: resources
      - path: Resources/v02.bin
        buildPhase: resources
      - path: Resources/v03.bin
        buildPhase: resources
      - path: Resources/v04.bin
        buildPhase: resources
      - path: Resources/v06.bin
        buildPhase: resources
      - path: Resources/v07.bin
        buildPhase: resources
      - path: Resources/v08.bin
        buildPhase: resources
      - path: Resources/v09.bin
        buildPhase: resources
      - path: Resources/v10.bin
        buildPhase: resources
      - path: Resources/v11.bin
        buildPhase: resources
      - path: Resources/v12.bin
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        # $(PRODUCT_NAME) resolves to "Mojito" for Release and "Mojito Dev"
        # for Debug (see configs.Debug below). Keeps the menu-bar app's
        # display name aligned with the bundle so the dev build is visibly
        # distinct everywhere macOS surfaces an app name.
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleDisplayName: "$(PRODUCT_NAME)"
        # Substituted at build time from MARKETING_VERSION / CURRENT_PROJECT_VERSION
        # below. release.sh bumps MARKETING_VERSION; Info.plist preprocessing
        # picks it up so the shipped bundle always reflects the released version.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Both keys point at the active icon name. actool compiles the
        # matching `.icon` bundle from Assets.xcassets into Assets.car and
        # writes the right metadata into CFBundleIcons; the explicit name
        # here keeps NSWorkspace.icon(forFile:) and older LaunchServices
        # paths happy when they look for it by name.
        CFBundleIconFile: "$(APP_ICON_NAME)"
        CFBundleIconName: "$(APP_ICON_NAME)"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Wells Riley"
        SUFeedURL: "https://mojito.wells.ee/appcast.xml"
        SUEnableInstallerLauncherService: true
        SUPublicEDKey: "NUW/cpxaKEqfwn2Uca4Zz9n01EmxhN0RRwhdma8GIuM="
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.wells.Mojito
        # Pin the Swift module name to "Mojito" so `@testable import Mojito`
        # works in Debug too — otherwise it'd derive from PRODUCT_NAME and
        # become "Mojito_Dev" for the dev build.
        PRODUCT_MODULE_NAME: Mojito
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "24"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        # Per-config $(APP_ICON_NAME) selects AppIcon vs AppIconDev from the
        # asset catalog so the dev build is visually distinct.
        ASSETCATALOG_COMPILER_APPICON_NAME: "$(APP_ICON_NAME)"
      configs:
        Debug:
          # Dev entitlements include cs.disable-library-validation so the
          # self-signed "Mojito Dev" identity can load Xcode's debug dylibs.
          CODE_SIGN_ENTITLEMENTS: Resources/Mojito.dev.entitlements
          # Debug builds get a distinct bundle ID + product name so macOS TCC
          # tracks Accessibility / Input Monitoring grants separately from
          # the released app. A shipped Mojito.app and a dev Mojito Dev.app
          # can coexist on the same Mac with independent permissions, login
          # items, and ⌘-Tab entries.
          PRODUCT_BUNDLE_IDENTIFIER: ee.wells.Mojito.dev
          PRODUCT_NAME: "Mojito Dev"
          # Visually distinct dock/Finder icon so the dev build is obviously
          # the dev build at a glance. Resolved into CFBundleIconFile via
          # $(APP_ICON_NAME) above.
          APP_ICON_NAME: "AppIconDev"
        Release:
          # Release ships with the minimum entitlements — library validation
          # stays enabled so dylib injection is blocked by Hardened Runtime.
          CODE_SIGN_ENTITLEMENTS: Resources/Mojito.entitlements
          APP_ICON_NAME: "AppIcon"
    dependencies:
      - package: Sparkle
      - package: KeyboardShortcuts
    preBuildScripts:
      # Bake the Giphy API key into Sources/Mojito/GifPicker/EmbeddedGiphyKey.swift
      # from $GIPHY_API_KEY (env var) or `.env` at repo root. The generated file
      # is gitignored; the script no-ops when contents are unchanged so this
      # doesn't churn rebuilds. See scripts/build_giphy_key.py for the format.
      - name: Embed Giphy API key
        script: |
          cd "$SRCROOT" && python3 scripts/build_giphy_key.py
        basedOnDependencyAnalysis: false
    postBuildScripts:
      # Debug builds: also install "Mojito Dev.app" into /Applications so it
      # shows up in Spotlight / Finder / Launchpad consistently and can be
      # launched from a stable path. Release builds skip this — those go
      # through scripts/release.sh which handles signing + DMG separately.
      - name: Install Mojito Dev to /Applications (Debug only)
        script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
            # Xcode 26's build system schedules this script BEFORE the
            # bundle's implicit codesign step (and serializes them — we
            # can't poll-wait because codesign blocks on us finishing).
            # So we sign the destination ourselves with the same identity
            # Xcode uses (`EXPANDED_CODE_SIGN_IDENTITY` is the cert SHA-1).
            # Sparkle.framework was signed earlier in the build and rsyncs
            # over already-signed; we just need to (re)sign the dylibs and
            # the bundle wrapper.
            rsync -a --delete "$TARGET_BUILD_DIR/$WRAPPER_NAME/" "/Applications/$WRAPPER_NAME/"
            DEST="/Applications/$WRAPPER_NAME"
            for f in "$DEST/Contents/MacOS"/*.dylib; do
              [ -f "$f" ] && codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                --options runtime --timestamp=none "$f" >/dev/null
            done
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
              --entitlements "$SRCROOT/$CODE_SIGN_ENTITLEMENTS" \
              --options runtime --timestamp=none "$DEST" >/dev/null
            echo "Copied $WRAPPER_NAME to /Applications/ (signed in place)"
            # If the app was already running, quit and relaunch from the new
            # build. `pkill` returns 0 only when it actually signalled something,
            # which doubles as our "was running" check — skip the relaunch on
            # a cold build so we don't surprise-launch the app.
            APP_NAME="${WRAPPER_NAME%.app}"
            if pkill -x "$APP_NAME" 2>/dev/null; then
              # Wait for clean exit so `open` picks up the freshly-copied bundle.
              for _ in $(seq 1 10); do
                pgrep -x "$APP_NAME" >/dev/null || break
                sleep 0.1
              done
              open "/Applications/$WRAPPER_NAME"
              echo "Relaunched $WRAPPER_NAME"
            fi
          fi
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - MojitoTests

  MojitoTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/MojitoTests
    dependencies:
      - target: Mojito
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ee.wells.MojitoTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mojito Dev.app/Contents/MacOS/Mojito Dev"
