<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mojito 1.1.1</title>
<style>
:root { color-scheme: light dark; }
body {
  font: -apple-system-body, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  margin: 16px 18px;
  color: #1d1d1f;
  background: transparent;
}
h1 { font-size: 17px; margin: 0 0 8px; }
h2 { font-size: 15px; margin: 16px 0 6px; }
h3 { font-size: 13px; margin: 12px 0 4px; }
p { margin: 6px 0; }
ul { margin: 6px 0; padding-left: 20px; }
li { margin: 3px 0; }
code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: rgba(0, 0, 0, 0.06);
  padding: 1px 4px;
  border-radius: 4px;
}
a { color: #0a7aff; }
@media (prefers-color-scheme: dark) {
  body { color: #f5f5f7; }
  code { background: rgba(255, 255, 255, 0.12); }
  a { color: #4aa3ff; }
}
</style>
</head>
<body>
<ul>
<li>Fixed an issue where Mojito could accidentally trigger in an excluded app.</li>
<li>Improved debug logs.</li>
</ul>
</body>
</html>
