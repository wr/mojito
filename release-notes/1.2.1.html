<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mojito 1.2.1</title>
<style>
:root { color-scheme: light dark; }
body {
  font: -apple-system-body, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  margin: 16px 18px;
  color: #1d1d1f;
  background: transparent;
}
h1 { font-size: 17px; margin: 0 0 8px; }
h2 { font-size: 15px; margin: 16px 0 6px; }
h3 { font-size: 13px; margin: 12px 0 4px; }
p { margin: 6px 0; }
ul { margin: 6px 0; padding-left: 20px; }
li { margin: 3px 0; }
code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  background: rgba(0, 0, 0, 0.06);
  padding: 1px 4px;
  border-radius: 4px;
}
a { color: #0a7aff; }
@media (prefers-color-scheme: dark) {
  body { color: #f5f5f7; }
  code { background: rgba(255, 255, 255, 0.12); }
  a { color: #4aa3ff; }
}
</style>
</head>
<body>
<h2>New</h2>
<ul>
<li><strong>Text arrows:</strong> type <code>-&gt;</code>, <code>&lt;-</code>, or <code>&lt;-&gt;</code> and they turn into → ← ↔. (<a href="https://github.com/wr/mojito/pull/93">#93</a>)</li>
</ul>
<h2>Fixed</h2>
<ul>
<li><strong>Update window:</strong> now shows release notes, and "Version history" opens the full changelog. (<a href="https://github.com/wr/mojito/pull/95">#95</a>, <a href="https://github.com/wr/mojito/pull/97">#97</a>)</li>
<li>Easter-egg polish.</li>
</ul>
</body>
</html>
